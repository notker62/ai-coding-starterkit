name: Sync with Upstream

on:
  schedule:
    - cron: '0 6 * * *'  # Täglich um 6:00 UTC
  workflow_dispatch:      # Manuell auslösbar via GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/AlexPEClub/ai-coding-starter-kit.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream into main
        run: git merge upstream/main --no-edit -m "chore: sync with upstream AlexPEClub/ai-coding-starter-kit"

      - name: Push to fork
        run: git push origin main
